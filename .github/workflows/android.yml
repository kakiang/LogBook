name: Android Release CI/CD

on:
  push:
    tags:
      - 'v*'

jobs:
  assemble-and-release:
    runs-on: ubuntu-latest

    # We must explicitly grant the runner permission to create releases and write code tags
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      # PHASE 1: Reconstruct the Keystore file safely out of Base64 storage
      - name: Decode Keystore File
        env:
          ENCODED_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$ENCODED_KEYSTORE" | base64 --decode > "${{ runner.temp }}/release_keystore.jks"

      # PHASE 2: Build the Production Signed APK
      # We map our GitHub repository secrets directly into global Environment Variables
      - name: Compile Release APK
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      # PHASE 3: Automatically clean the name and locate the output binary asset
      # This keeps your release files predictably organized
      - name: Prepare Clean Release Asset
        run: |
          echo "=== Listing all files in the build output directory ==="
          find app/build/outputs/apk/ -type f
          mkdir -p release_artifacts
          cp app/build/outputs/apk/release/*.apk release_artifacts/LogBook-${{ github.ref_name }}.apk

      # PHASE 4: Instantiate the Release Node on your GitHub Repository page
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_artifacts/LogBook-${{ github.ref_name }}.apk
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Automatically provided by GitHub internals